services:
  app:
    container_name: load-forecasting-dashboard
    restart: always
    build:
      context: .
      args:
        REACT_APP_BACKEND_BASE_URL: ${REACT_APP_BACKEND_BASE_URL}
        REACT_APP_MLFLOW: ${REACT_APP_MLFLOW}
        REACT_APP_KEYCLOAK_REALM: ${REACT_APP_KEYCLOAK_REALM}
        REACT_APP_KEYCLOAK_URL: ${REACT_APP_KEYCLOAK_URL}
        REACT_APP_KEYCLOAK_CLIENT_ID: ${REACT_APP_KEYCLOAK_CLIENT_ID}
        REACT_APP_DAGSTER_ENDPOINT_URL: ${REACT_APP_DAGSTER_ENDPOINT_URL}
        REACT_APP_BACKEND_WS_URL: ${REACT_APP_BACKEND_WS_URL}
    volumes:
      - ./src:/app/src
    ports:
      - '3000:3000'
    stdin_open: true
    # networks:
    #   - keycloak_net
    env_file:
      - .env

