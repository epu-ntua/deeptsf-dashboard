stages:
  - build-app
  - deploy-dev
  - deploy-stage
  - deploy-prod


variables:
  HARBOR_IMAGE: "${HARBOR_HOST}/iccs/deeptsf-dashboard:latest"
  #REACT_APP_BACKEND_BASE_URL: ${REACT_APP_BACKEND_BASE_URL}
  REACT_APP_AUTH: "True"
  REACT_APP_KEYCLOAK_URL: "https://keycloak.toolbox.epu.ntua.gr/"
  CHOKIDAR_USEPOLLING: "true"

build-app:
  stage: build-app
  image: harbor.aiodp.ai/cvm-public/ci-tools
  services:
    - docker:dind
  variables:
    DOCKER_DRIVER: overlay2
  script:
    - echo "Building Docker image for the React app..."
    - docker build  -f deeptsf-dashboard/Dockerfile -t ${HARBOR_IMAGE} ./deeptsf-dashboard
    - echo "Logging into Harbor using Robot Account..."
    - echo ${HARBOR_ROBOT_PASSWORD} | docker login ${HARBOR_HOST} -u ${HARBOR_ROBOT_USER} --password-stdin
    - echo "Pushing Docker image to Harbor..."
    - docker push ${HARBOR_IMAGE}
  only:
    - main
  tags:
    - shared

deploy-dev:
  stage: deploy-dev
  image: harbor.aiodp.ai/cvm-public/ci-tools
  dependencies:
    - build-app
  before_script:
    - echo "Secure the KUBECONFIG file"
    - chmod 600 ${KUBECONFIG}
    - export KUBECONFIG=${KUBECONFIG}
  script:
    # Verify Kubernetes cluster connectivity
    - kubectl get nodes
    - echo "Deploying application using Helm..."
    - |
      helm upgrade --install deeptsf-dashboard ./helm-chart \
        -f helm-chart/values.yaml \
        --namespace iccs \
        --atomic \
        --wait \
        --set storageClassName=longhorn \
        --set registry.password=${HARBOR_ROBOT_PASSWORD} \
        --set registry.username=${HARBOR_ROBOT_USER} \
        --set registry.registry=${HARBOR_HOST} \
        --set commitHash=${CI_COMMIT_SHA} \
        --set app.image.repository="${HARBOR_HOST}/iccs/deeptsf-dashboard" \
        --set app.image.tag="latest" \
        --set app.env.host=deeptsf.dev.aiodp.ai \
        --set app.env.REACT_APP_BACKEND_BASE_URL="${REACT_APP_BACKEND_BASE_URL}" \
        --set app.env.REACT_APP_AUTH="${REACT_APP_AUTH}" \
        --set app.env.REACT_APP_MLFLOW="${REACT_APP_MLFLOW}" \
        --set app.env.REACT_APP_KEYCLOAK_REALM="${REACT_APP_KEYCLOAK_REALM}" \
        --set app.env.REACT_APP_KEYCLOAK_URL="${REACT_APP_KEYCLOAK_URL}" \
        --set app.env.REACT_APP_KEYCLOAK_CLIENT_ID="${REACT_APP_KEYCLOAK_CLIENT_ID}" \
        --set app.env.REACT_APP_DAGSTER_ENDPOINT_URL="${REACT_APP_DAGSTER_ENDPOINT_URL}" \
        --set app.env.REACT_APP_BACKEND_WS_URL="${REACT_APP_BACKEND_WS_URL}"
  only:
    - main
  tags:
    - shared
  environment:
    name: dev

